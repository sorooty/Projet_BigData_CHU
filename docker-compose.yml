# CHU Data Pipeline — Docker Compose
# Démarre tout: docker-compose up -d
# Interface Airflow: http://localhost:8080 (airflow / airflow)
# Seul Seyni modifie ce fichier.

# Réseau interne avec IP statique pour postgres (évite les aléas du DNS Docker Desktop Windows)
networks:
  chu_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow.Dockerfile
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AIRFLOW_DB:-airflow}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    PYTHONPATH: /opt/airflow/dags:/opt/airflow/sql/scripts
  # extra_hosts injecte l'IP statique de postgres dans /etc/hosts de chaque
  # container Airflow → contourne la résolution DNS Docker Desktop instable
  extra_hosts:
    - "postgres:172.28.0.10"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./sql:/opt/airflow/sql
    - ./data:/opt/airflow/data
    - airflow_logs:/opt/airflow/logs
  networks:
    - chu_net
  depends_on:
    postgres:
      condition: service_healthy

services:

  postgres:
    image: postgres:16-alpine
    container_name: chu_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      chu_net:
        ipv4_address: 172.28.0.10

  airflow-init:
    <<: *airflow-common
    container_name: chu_airflow_init
    restart: "no"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db upgrade
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER:-airflow} \
          --password ${AIRFLOW_ADMIN_PASSWORD:-airflow} \
          --firstname Admin \
          --lastname CHU \
          --role Admin \
          --email admin@chu-pipeline.local

  airflow-webserver:
    <<: *airflow-common
    container_name: chu_airflow_webserver
    restart: unless-stopped
    # rm -f élimine le PID file obsolète laissé par un arrêt brutal (stale pid)
    command: bash -c "rm -f /opt/airflow/airflow-webserver.pid /opt/airflow/airflow-webserver-monitor.pid && exec airflow webserver"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: chu_airflow_scheduler
    restart: unless-stopped
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  metabase:
    image: metabase/metabase:v0.50.29
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase_data:/metabase-data
    networks:
      - chu_net

volumes:
  postgres_data:
  airflow_logs:
  metabase_data:
